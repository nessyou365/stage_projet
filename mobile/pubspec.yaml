name: talentai_mobile
description: HireQ candidate mobile application built with Flutter and Firestore sync.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.11
  file_picker: ^8.1.2
  http: ^1.2.2
  syncfusion_flutter_pdf: ^27.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/hireq-login-background.png
    - assets/home-background.png
    - assets/home-offers-card.png
    - assets/home-spontaneous-card.png
    - assets/jobs-background.png
    - assets/application-status-background.png
    - assets/spontaneous-hero.png
